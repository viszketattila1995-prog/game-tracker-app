<div class="container d-flex justify-content-center align-items-center">
  <div class="mt-5 card shadow" style="min-height: 20vh; width: 60%">
    <h3 class="mt-3 d-flex justify-content-center">Create New Platform</h3>

    @if (errorMessage()) {
      <div class="alert alert-danger mx-auto" style="max-width: 80%">{{ errorMessage() }}</div>
    }

    <form [formGroup]="platformForm" (ngSubmit)="createPlatform()">
      <div class="mt-3 mx-auto text-center" style="max-width: 80%">
        <label for="name" class="form-label fw-bold">Platform Name: </label>
        <input type="text" class="form-control" formControlName="name"
               [ngClass]="{'is-invalid': platformForm.get('name')?.invalid && platformForm.get('name')?.touched}">
        @if (platformForm.get('name')?.invalid && platformForm.get('name')?.touched) {
          <small class="text-danger">Please enter the name</small>
        }
      </div>

      <div class="mt-3 mx-auto text-center" style="max-width: 80%">
        <label for="manufacturer" class="form-label fw-bold">Platform manufacturer: </label>
        <input type="text" class="form-control" formControlName="manufacturer"
               [ngClass]="{'is-invalid': platformForm.get('manufacturer')?.invalid && platformForm.get('manufacturer')?.touched}">
        @if (platformForm.get('manufacturer')?.invalid && platformForm.get('manufacturer')?.touched) {
          <small class="text-danger">Please enter the manufacturer</small>
        }
      </div>

      <div class="mt-3 ps-5">
        <button class="btn btn-success" [disabled]="platformForm.invalid">Create Platform</button>
      </div>
      <div class="mt-5"></div>
    </form>
  </div>
</div>
